<svg xmlns="http://www.w3.org/2000/svg" width="720" height="1040" viewBox="0 0 720 1040">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d111b"/>
      <stop offset="1" stop-color="#07090f"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.55">
      <stop offset="0" stop-color="#00e5ff" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="720" height="1040" fill="url(#bg)"/>
  <rect width="720" height="1040" fill="url(#glow)"/>

  <!-- 人形剪影 -->
  <g fill="#182036" opacity="0.9">
    <circle cx="360" cy="360" r="120"/>
    <path d="M360 470 C 220 470 150 560 150 720 L 150 1040 L 570 1040 L 570 720 C 570 560 500 470 360 470 Z"/>
  </g>

  <!-- 問號光暈 -->
  <text x="360" y="430" text-anchor="middle"
        font-family="'Orbitron','Rajdhani',sans-serif" font-size="300" font-weight="700"
        fill="#00e5ff" opacity="0.35" filter="url(#soft)">?</text>
  <!-- 問號主體 -->
  <text x="360" y="430" text-anchor="middle"
        font-family="'Orbitron','Rajdhani',sans-serif" font-size="300" font-weight="700"
        fill="#5ef1ff">?</text>

  <!-- 標籤 -->
  <text x="360" y="560" text-anchor="middle"
        font-family="'Noto Sans TC','Microsoft JhengHei',sans-serif" font-size="44"
        letter-spacing="10" fill="#9fb0d6">隱匿中</text>
  <text x="360" y="610" text-anchor="middle"
        font-family="'Orbitron','Rajdhani',sans-serif" font-size="26"
        letter-spacing="8" fill="#5e6b8e">CLASSIFIED</text>
</svg>
