<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iframe 嵌入測試 — dx3-mio</title>
  <style>
    body { margin: 0; background: #222; color: #ddd; font-family: "Segoe UI", "Microsoft JhengHei", sans-serif; padding: 24px; }
    h1 { font-size: 18px; font-weight: 600; }
    p  { font-size: 14px; color: #aaa; }
    .row { display: flex; flex-wrap: wrap; gap: 24px; align-items: flex-start; margin-top: 16px; }
    .frame { border: 1px solid #444; }
    .frame figcaption { font-size: 12px; color: #888; padding: 4px 2px; }
    iframe { display: block; border: 0; background: #07090f; }
  </style>
</head>
<body>
  <h1>iframe 嵌入測試</h1>
  <p>用不同尺寸確認等比縮放與 letterbox（黑邊）行為。請以 http 伺服器開啟本頁。</p>

  <div class="row">
    <figure class="frame">
      <iframe src="index.html" width="1280" height="720"></iframe>
      <figcaption>1280 × 720（16:9，無黑邊）</figcaption>
    </figure>

    <figure class="frame">
      <iframe src="index.html" width="960" height="720"></iframe>
      <figcaption>960 × 720（4:3，左右黑邊）</figcaption>
    </figure>

    <figure class="frame">
      <iframe src="index.html" width="1100" height="420"></iframe>
      <figcaption>1100 × 420（寬扁，上下黑邊）</figcaption>
    </figure>
  </div>
</body>
</html>
